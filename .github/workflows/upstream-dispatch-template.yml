# pragma: example
# Template workflow — install in upstream skill source repos (fluttersdk/wind, magic, dusk, telescope, artisan).
# Replace <SOURCE_NAME> with: wind | magic | dusk | telescope | artisan.
# Replace <SKILL_PATH> with the upstream's `skills/<name>/` relative path.
# This file's trigger is intentionally inert in fluttersdk/ai (no .ai branch exists).
#
# Auth: uses the fluttersdk-registry GitHub App (1-hour mint-on-demand tokens) instead
# of a personal PAT. Requires REGISTRY_BOT_APP_ID + REGISTRY_BOT_PRIVATE_KEY secrets
# on each upstream repo (same values as on fluttersdk/ai).

name: Dispatch skill update to registry

on:
  push:
    branches: ["never-trigger-in-registry"]  # placeholder; replace with actual upstream branch
    paths:
      - "<SKILL_PATH>/**"
      - "pubspec.yaml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Extract version
        id: ver
        run: |
          set -euo pipefail
          if [[ -n "${GITHUB_REF_NAME}" && "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            VER="${GITHUB_REF_NAME#v}"
          else
            VER=$(grep -E '^version:' pubspec.yaml | head -1 | awk '{print $2}')
          fi
          # Strip Dart/Flutter build metadata suffix (e.g. 1.2.3+4 -> 1.2.3) so the
          # dispatched version matches the registry's expected x.y.z[-prerelease] regex.
          VER="${VER%%+*}"
          if [[ -z "$VER" ]]; then
            echo "::error::could not extract a non-empty version from ref or pubspec.yaml"
            exit 1
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Mint App token scoped to fluttersdk/ai
        id: app-token
        uses: tibdex/github-app-token@v2.1.0
        with:
          app_id: ${{ secrets.REGISTRY_BOT_APP_ID }}
          private_key: ${{ secrets.REGISTRY_BOT_PRIVATE_KEY }}
          installation_retrieval_mode: repository
          installation_retrieval_payload: fluttersdk/ai
          repositories: '["ai"]'

      - name: Fire repository_dispatch to fluttersdk/ai
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: fluttersdk/ai
          event-type: skill-updated
          client-payload: |
            {
              "source": "<SOURCE_NAME>",
              "version": "${{ steps.ver.outputs.version }}",
              "sha": "${{ github.sha }}"
            }
