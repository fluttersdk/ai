name: Deploy Skills Registry

on:
    workflow_dispatch:
    push:
        branches: ["main"]
        paths: ["skills/**"]

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup Pages
              uses: actions/configure-pages@v6

            - name: Add .well-known skills route
              run: |
                  mkdir -p skills/.well-known/skills
                  cp skills/index.json skills/.well-known/skills/index.json

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v5
              with:
                  path: "./skills"

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5
